<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- rounded surface so the mark reads on both light and dark browser tabs -->
  <rect x="0" y="0" width="32" height="32" rx="7.5" fill="#ffffff"/>
  <!-- "TW" wordmark spanning the arrow's width: T in heading black, W in accent blue -->
  <g font-family="'Space Grotesk', ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-weight="800" font-size="22">
    <text x="1" y="25" text-anchor="start" fill="#0f172a">T</text>
    <text x="31" y="25" text-anchor="end" fill="#0284c7">W</text>
  </g>
  <!-- lucide TrendingUp arrow, overlapping the letters, with a white outer stroke -->
  <g fill="none" stroke-linecap="round" stroke-linejoin="round" transform="translate(16 16) scale(0.7) translate(-16 -16)">
    <g stroke="#ffffff" stroke-width="5">
      <polyline points="29.33 9.33 18 20.67 11.33 14 2.67 22.67"/>
      <polyline points="21.33 9.33 29.33 9.33 29.33 17.33"/>
    </g>
    <g stroke="#0284c7" stroke-width="2.6">
      <polyline points="29.33 9.33 18 20.67 11.33 14 2.67 22.67"/>
      <polyline points="21.33 9.33 29.33 9.33 29.33 17.33"/>
    </g>
  </g>
</svg>
